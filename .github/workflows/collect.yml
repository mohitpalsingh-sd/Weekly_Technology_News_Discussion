name: Weekly Collect
on:
schedule:
- cron: "0 14 * * 1"
workflow_dispatch:
# Mondays 14:00 UTC (~06:00 PT)
# allows manual runs
permissions:
contents: write
jobs:
collect:
runs-on: ubuntu-latest
steps:
- uses: actions/checkout@v4
- uses: actions/setup-python@v5
with:
python-version: "3.12"
- name: Install deps
run: pip install feedparser pyyaml
- name: Run collector
run: python collect.py
- name: Commit digest
run: |
git config user.name "github-actions"
git config user.email "actions@github.com"
git add digests/
git diff --staged --quiet || git commit -m "Weekly digest $(date -u +%F)"
git push
